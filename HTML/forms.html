<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <!--<link rel="stylesheet" href="../CSS/position.css">--> 
    <title>Forms</title>
</head>
<body>
    <div class="data">
        <header>
            <h1 id="application">Forms</h1>
        </header>
        <main>
            <form>
                <label>Name : </label>
                <input id="name" type="text" placeholder="Enter your name">
                <br><br>
                <label>Email : </label>
                <input id="email" type="email" placeholder="Enter your email">
                <br><br>
                <label>Password : </label>
                <input id="password" type="password" placeholder="Enter your password">
                <br><br>
                <label>Mobile : </label>
                <input id="mobile" type="tel" placeholder="Enter your mobile number">
                <br><br>
                <label>Gender : </label>
                <input id="male" type="radio" name="gender" value="male">Male
                <input id="female" type="radio" name="gender" value="female">Female
                <br><br>
                <label>Qualification : </label>
                <input class="qualify" type="checkbox" name="qualif" value="10th">10th
                <input class="qualify" type="checkbox" name="qualif" value="12th">12th
                <input class="qualify" type="checkbox" name="qualif" value="diploma">Diploma
                <input class="qualify" type="checkbox" name="qualif" value="bachelor">Bachelor
                <input class="qualify" type="checkbox" name="qualif" value="graduation">Graduation 
                <br><br>
                <label>D.O.B :</label>
                <input id="dob" type="datetime-local" name="dob">
                <br><br>
                <label>Image :</label>
                <input id="image" type="file" name="image">
                <br><br>
                <label>Color :</label>
                <input id="color" type="color" name="color">
                <br><br>
                <button type="submit">Submit</button>

            </form>
        </main>
        <footer>
            <p>Copyright &copy; 2024</p>        
        </footer>
    </div>
    <script src="../JS/script.js"></script>
    
</body>
</html>
